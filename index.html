<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Processing Images...</title>
  <style>
    :root {
      --bg-1: #111525;
      --bg-2: #08090f;
      --panel: rgba(16, 20, 34, 0.82);
      --panel-border: rgba(255, 255, 255, 0.08);
      --text: #f5f7fb;
      --muted: #a8b0c2;
      --accent-1: #67d1ff;
      --accent-2: #3d7eff;
      --danger: #ff4566;
      --shadow: 0 24px 60px rgba(0, 0, 0, 0.45);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(59, 87, 163, 0.22), transparent 34%),
        linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 100%);
      display: grid;
      place-items: center;
      overflow: hidden;
      padding: 24px;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
      background-size: 30px 30px;
      opacity: 0.22;
      pointer-events: none;
    }

    .stage {
      width: min(100%, 920px);
      padding: clamp(24px, 4vw, 42px);
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 28px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      text-align: center;
      position: relative;
      z-index: 1;
      animation: fade-up 0.8s ease both;
      transition: opacity 0.45s ease, transform 0.45s ease;
    }

    .stage.hidden {
      opacity: 0;
      transform: translateY(16px) scale(0.98);
      pointer-events: none;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 700;
      letter-spacing: 0.03em;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: clamp(0.95rem, 2vw, 1.05rem);
    }

    .loading {
      width: min(100%, 440px);
      margin: 28px auto 32px;
    }

    .loading-track {
      width: 100%;
      height: 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      overflow: hidden;
      position: relative;
    }

    .loading-fill {
      width: 18%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--accent-1), var(--accent-2));
      box-shadow: 0 0 18px rgba(61, 126, 255, 0.55);
      transition: width 0.35s linear;
    }

    .loading-track::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.28), transparent);
      transform: translateX(-100%);
      animation: loading-sheen 1.8s linear infinite;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      width: 100%;
    }

    .card {
      padding: 10px;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      transition: transform 0.25s ease, border-color 0.25s ease;
    }

    .card:hover {
      transform: translateY(-4px);
      border-color: rgba(103, 209, 255, 0.38);
    }

    .preview-image {
      display: block;
      width: 100%;
      aspect-ratio: 4 / 5;
      object-fit: cover;
      border: 0;
      border-radius: 16px;
      cursor: pointer;
      background: linear-gradient(135deg, #1a1f32, #0d1019);
      filter: blur(24px) brightness(0.48) saturate(0.55) contrast(0.9);
      transform: scale(1.08);
      transition: filter 0.18s ease, transform 0.18s ease, opacity 0.25s ease;
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.28);
    }

    .card.reveal .preview-image {
      filter: blur(2px) brightness(1.02) saturate(0.98) contrast(1.08);
      transform: scale(1.08);
    }

    .flash {
      position: fixed;
      inset: 0;
      background: white;
      opacity: 0;
      pointer-events: none;
      z-index: 2;
    }

    .flash.active {
      animation: flash-bang 0.32s ease-out forwards;
    }

    .overlay {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
      z-index: 3;
      text-align: center;
    }

    .overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .scare-screen {
      background:
        radial-gradient(circle at center, rgba(160, 0, 0, 0.22), transparent 34%),
        radial-gradient(circle at center, rgba(255, 255, 255, 0.08), transparent 55%),
        #020202;
    }

    .ghost-wrap {
      animation: fade-up 0.38s ease both;
    }

    .ghost-image {
      width: min(82vw, 420px);
      display: block;
      filter:
        drop-shadow(0 0 26px rgba(255, 255, 255, 0.28))
        drop-shadow(0 0 44px rgba(255, 40, 40, 0.16));
      animation: ghost-float 0.7s ease-in-out infinite alternate;
    }

    .final-screen {
      background:
        radial-gradient(circle at top, rgba(74, 115, 255, 0.22), transparent 30%),
        linear-gradient(180deg, #101524 0%, #06070b 100%);
      z-index: 4;
    }

    .final-message {
      margin: 0;
      font-size: clamp(2.7rem, 10vw, 5.8rem);
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      animation: fade-up 0.6s ease both;
      text-shadow: 0 10px 30px rgba(0, 0, 0, 0.38);
    }

    @keyframes fade-up {
      from {
        opacity: 0;
        transform: translateY(18px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes flash-bang {
      0% {
        opacity: 0;
      }

      35% {
        opacity: 1;
      }

      100% {
        opacity: 0;
      }
    }

    @keyframes ghost-float {
      from {
        transform: translateY(-6px) scale(1);
      }

      to {
        transform: translateY(8px) scale(1.02);
      }
    }

    @keyframes loading-sheen {
      from {
        transform: translateX(-100%);
      }

      to {
        transform: translateX(100%);
      }
    }

    @media (max-width: 560px) {
      body {
        padding: 16px;
      }

      .stage {
        padding: 22px 18px;
        border-radius: 22px;
      }

      .gallery {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="stage" id="mainStage">
    <h1>Processing Images...</h1>
    <p class="subtitle">Please wait while we load files</p>

    <div class="loading" aria-hidden="true">
      <div class="loading-track">
        <div class="loading-fill" id="loadingFill"></div>
      </div>
    </div>

    <section class="gallery" aria-label="Image previews">
      <div class="card">
        <img class="preview-image" alt="Blurred preview 1">
      </div>
      <div class="card">
        <img class="preview-image" alt="Blurred preview 2">
      </div>
      <div class="card">
        <img class="preview-image" alt="Blurred preview 3">
      </div>
    </section>
  </main>

  <div class="flash" id="flash"></div>

  <section class="overlay scare-screen" id="scareScreen" aria-hidden="true">
    <div class="ghost-wrap">
      <img class="ghost-image" id="ghostImage" alt="Scary ghost">
    </div>
  </section>

  <section class="overlay final-screen" id="finalScreen" aria-hidden="true">
    <h2 class="final-message">APRIL FOOLS &#128514;</h2>
  </section>

  <script>
    const PREVIEW_IMAGES = ["1.jpg", "2.jpg", "3.jpg"];

    const GHOST_SVG = `
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 500">
        <defs>
          <radialGradient id="bodyGlow" cx="50%" cy="35%" r="70%">
            <stop offset="0%" stop-color="#ffffff"/>
            <stop offset="100%" stop-color="#d7d7d7"/>
          </radialGradient>
        </defs>
        <path fill="url(#bodyGlow)" d="M210 46c95 0 158 78 158 182v168l-41-28-36 40-39-34-42 38-42-38-40 34-35-40-41 28V228c0-104 63-182 158-182Z"/>
        <ellipse cx="154" cy="207" rx="27" ry="39" fill="#070707"/>
        <ellipse cx="266" cy="207" rx="27" ry="39" fill="#070707"/>
        <ellipse cx="154" cy="207" rx="16" ry="24" fill="#ff334f"/>
        <ellipse cx="266" cy="207" rx="16" ry="24" fill="#ff334f"/>
        <path fill="#0a0a0a" d="M177 304c14-22 52-24 66 0 11 17-13 53-33 53s-44-36-33-53Z"/>
        <path fill="#ffffff" fill-opacity=".7" d="M124 102c19-23 53-41 101-41 26 0 49 5 69 14-42-8-84 2-117 27-18 14-31 30-39 45-2-14-5-29-14-45Z"/>
      </svg>
    `;

    const loadingFill = document.getElementById("loadingFill");
    const previewImages = document.querySelectorAll(".preview-image");
    const mainStage = document.getElementById("mainStage");
    const flash = document.getElementById("flash");
    const scareScreen = document.getElementById("scareScreen");
    const finalScreen = document.getElementById("finalScreen");
    const ghostImage = document.getElementById("ghostImage");

    let progress = 14;
    let direction = 1;
    let prankTriggered = false;

    previewImages.forEach((image, index) => {
      image.src = PREVIEW_IMAGES[index] || PREVIEW_IMAGES[0];
      image.alt = "Blurred preview " + (index + 1);
      image.addEventListener("click", () => triggerPrank(image.closest(".card")));
    });

    ghostImage.src = "data:image/svg+xml;charset=UTF-8," + encodeURIComponent(GHOST_SVG);

    const loadingTimer = setInterval(() => {
      if (prankTriggered) {
        return;
      }

      progress += direction * (Math.random() * 6 + 2);

      if (progress >= 96) {
        progress = 96;
        direction = -1;
      } else if (progress <= 26) {
        progress = 26;
        direction = 1;
      }

      loadingFill.style.width = progress + "%";
    }, 280);

    function triggerPrank(card) {
      if (prankTriggered) {
        return;
      }

      prankTriggered = true;
      clearInterval(loadingTimer);
      loadingFill.style.width = "100%";
      card.classList.add("reveal");

      flash.classList.remove("active");
      void flash.offsetWidth;
      flash.classList.add("active");

      setTimeout(() => {
        mainStage.classList.add("hidden");
        scareScreen.classList.add("active");
      }, 220);

      setTimeout(() => {
        finalScreen.classList.add("active");
      }, 2200);
    }
  </script>
</body>
</html>
